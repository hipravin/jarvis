<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Javrvis</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts Link For Icons -->

    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />

<body class="show-chatbot">
  <div class="chatbot">
    <header>
      <h2>Jarvis</h2>

<!--        <span id="gh-toggle" class="material-symbols-outlined provider-on">code_blocks</span>-->
        <span id="bs-toggle"  class="material-symbols-outlined provider-on">import_contacts</span>
        <span id="se-toggle"  class="material-symbols-outlined provider-on">stacks</span>
        <span id="gb-toggle"  class="material-symbols-outlined provider-on">book_2</span>
      </h2>

      <h2><a style="color: #f0f2f5; margin-left: 10rem" href="/cursor/index.html">!New UI!</a> </h2>

      <h2 id="logged-in-label"> Hello, </h2>
    </header>
    <ul class="chatbox">
      <li class="chat incoming">
        <span class="material-symbols-outlined">smart_toy</span>
        <p>Hi there 👋<br>How can I help you today?</p>
      </li>
    </ul>

    <div class="chat-input">
      <textarea placeholder="Enter a query..." spellcheck="false" required autofocus></textarea>
      <span id="send-btn" class="material-symbols-rounded">send</span>
    </div>

  </div>

</body>

</html>
