spring:
  profiles:
    active: secured,swagger
  config:
    import: optional:${SECRETS_PROPERTIES_PATH}
  application:
    name: jarvis

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
      max-poll-records: 500
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: latest
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
#        spring.json.value.default.type: hipravin.sampleskafka.dto.ClockTickEvent
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
    listener:
      ack-mode: batch #record ack is about 1000 times slower than batch

  flyway:
    default-schema: jarvis
    enabled: false

  datasource:
    url: ${JARVIS_DB_URL}
    username: ${JARVIS_DB_USER}
    password: ${JARVIS_DB_PASSWORD}

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB
      enabled: true

  jpa:
    properties:
      hibernate:
        query:
          fail_on_pagination_over_collection_fetch: true
        default_schema: "jarvis"
        order_inserts: true
        order_updates: true

        #        generate_statistics: true
        jdbc:
          batch_size: 100
          time_zone: UTC
        hbm2ddl:
          auto: none
server:
  port: 10010

management:
  server:
    port: 10011
    user: ${ACTUATOR_USER} #custom property
    password: ${ACTUATOR_PASSWORD} #custom property
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: when_authorized #For HTTP endpoints, a user is considered to be authorized if they have authenticated and have the roles configured by the endpoint’s roles property. By default, any authenticated user is authorized.
      probes:
        enabled: true #liveness and readiness probes, enabled by default
  info:
    git:
      enabled: true
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    process:
      enabled: true

resilience4j:
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 100ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
#        retryExceptions:
#          - java.io.IOException
#          - java.util.concurrent.TimeoutException
#        ignoreExceptions:
#          - io.github.robwin.exception.BusinessException
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        slowCallDurationThreshold: 4s
        slowCallRateThreshold: 90
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        minimumNumberOfCalls: 10
    instances:
      myCircuitBreaker:
        baseConfig: default
        waitDurationInOpenState: 20s
      resilientExternalService:
        baseConfig: default
        waitDurationInOpenState: 30s

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

statistic:
  search:
    enabled: true

jarvis:
  search-service:
    timeout-ms: 60000

bookstore:
  loader-root-path: ${BOOKSTORE_LOADER_DIR}
  initialload:
    enabled: true

googlebooks:
  books-search-url: "https://www.googleapis.com/books/v1/volumes"
  api-key: ${GOOGLE_API_KEY}
  connection:
    timeout: 10_000

github:
  code-search-url: "https://api.github.com/search/code"
  code-search-browser-url-template: "https://github.com/search?q=%s&type=code"
  token: ${GH_TOKEN}
  single-request-max-or: 5
  code-search-per-page: 100
  connection:
    timeout: 10_000

  approved-authors: #TODO: implement search result statistics
    - hipravin
    - gunnarmorling
    - kehrlann
    - mraible
    - philwebb
    - vladmihalcea
    - josepaumard
    - bclozel
    - timosalm
    - briangoetz
    - spring-tips
    - baeldung
    - eugenp
    - epam
    - eclipse-hawkbit
    - sonarsource
    - snicoll
    - spring-projects
    - dataverse
    - danvega
    - apereo

stackexchange:
  api-base-url: "https://api.stackexchange.com/2.3"
  connection:
    timeout: 10_000
  excerpts:
    url: "/search/excerpts"
    params:
      "site": "stackoverflow"
      "order": "desc"
      "sort": "relevance"

logging:
  level:
    hipravin: DEBUG
    com.hipravin: DEBUG
    org.springframework: INFO

---
spring:
  config:
    activate:
      on-profile: secured
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: jarvisclient
            #            client-secret: devcompanion-keycloak-secret  #if client set to 'confidential' in admin console
            scope: openid
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URL}/realms/jarvisrealm

---
spring:
  config:
    activate:
      on-profile: swagger

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true